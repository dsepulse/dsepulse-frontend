<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Combined Signal &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.tbl{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;max-width:920px}
.thead{padding:9px 18px;background:var(--cream2);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.empty{padding:34px;text-align:center;color:var(--text3);font-size:12px}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>
<div class="wrap">
  <div class="h-title">Combined Signal</div>
  <div class="h-sub">Picker + WMA + Tech consensus</div>
  <div class="tbl">
    <div class="thead" style="display:grid;grid-template-columns:1fr 75px 110px 75px 90px 110px;gap:8px"><div>Stock</div><div style="text-align:right">Picker</div><div style="text-align:center">WMA</div><div style="text-align:right">Tech</div><div style="text-align:right">LTP</div><div style="text-align:center">Signal</div></div>
    <div id="combined-rows"><div class="empty">Loading combined signals&hellip;</div></div>
  </div>
  <div id="combined-empty" style="display:none;font-size:12px;color:var(--text3);margin-top:10px">No STRONG BUY consensus today.</div>
  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>
<script>
const API="https://dsepulse-backend-production.up.railway.app";
const sigBg={"STRONG BUY":"var(--green-bg)","BUY":"#F0FDF4","NEUTRAL":"var(--gold-bg)","SELL":"var(--red-bg)"};
const sigTxt={"STRONG BUY":"var(--green)","BUY":"var(--green)","NEUTRAL":"var(--gold)","SELL":"var(--red)"};
const scC=s=>s>=70?'var(--green)':s>=55?'var(--gold)':'var(--red)';
async function fetchJSON(path){ try{ const r=await fetch(API+path); if(!r.ok)return null; return await r.json(); }catch(e){ return null; } }
async function buildCombined(){
  const el=document.getElementById('combined-rows');if(!el)return;
  const live=await fetchJSON('/api/combined/today');
  if(!Array.isArray(live)||!live.length){ el.innerHTML='<div class="empty">No combined signals available right now.</div>'; return; }
  const emp=document.getElementById('combined-empty');
  if(emp&&!live.some(r=>r.signal==='STRONG BUY'))emp.style.display='block';
  const rows=live.slice(0,60);
  el.innerHTML=rows.map((r,i)=>{
    const pk=Number(r.picker||0),tech=Number(r.tech||0),ltp=Number(r.ltp||0),sig=r.signal||'',wma=r.wma||'';
    return `<div style="display:grid;grid-template-columns:1fr 75px 110px 75px 90px 110px;gap:8px;padding:9px 18px;align-items:center;border-bottom:1px solid var(--border);background:${sigBg[sig]||'transparent'}${i===rows.length-1?';border-bottom:none':''}"><div><span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">${r.code}</span> <span style="font-size:9px;padding:1px 6px;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text3)">${r.cat}</span></div><div style="text-align:right;font-size:11px;font-family:var(--mono);color:var(--text2)">${pk.toFixed(0)}<span style="font-size:8px;color:var(--text3)">/45</span></div><div style="text-align:center"><span style="font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;color:${sigTxt[wma]||'var(--text3)'};background:${sigBg[wma]||'var(--cream2)'}">${wma||'–'}</span></div><div style="text-align:right;font-size:12px;font-weight:800;font-family:var(--mono);color:${tech>=70?'var(--green)':'var(--navy)'}">${tech.toFixed(0)}</div><div style="text-align:right;font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">৳${ltp.toFixed(2)}</div><div style="text-align:center"><span style="padding:3px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:${sigTxt[sig]||'var(--text2)'};background:${sigBg[sig]||'var(--cream2)'};border:1px solid currentColor;border-radius:4px;opacity:0.85">${sig}</span></div></div>`;
  }).join('');
}
buildCombined();
</script>
</body>
</html>
