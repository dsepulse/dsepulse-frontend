<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Compare &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2; --info:#1D4ED8; --info-bg:#EAF1FB;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:980px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.inputs{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:12px;align-items:end}
.in-box label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);display:block;margin-bottom:5px}
input[type=text]{padding:9px 11px;font-size:13px;border:1px solid var(--border2);border-radius:6px;background:var(--white);color:var(--navy);font-family:var(--mono);text-transform:uppercase;width:150px}
.btn{padding:10px 22px;font-size:13px;font-weight:700;background:var(--navy);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif}
.btn:hover{background:var(--navy2)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:15px 17px}
.card.top{border:2px solid var(--info)}
.badge{font-size:11px;font-weight:700;color:var(--info);background:var(--info-bg);padding:3px 10px;border-radius:6px}
.c-code{font-size:17px;font-weight:800;font-family:var(--mono);color:var(--navy);margin:9px 0 1px}
.c-name{font-size:11px;color:var(--text2);line-height:1.3}
.c-meta{font-size:12px;color:var(--text3);margin-top:2px}
.pill{display:inline-block;margin:11px 0;padding:4px 11px;font-size:11px;font-weight:700;border-radius:6px}
.ctab{width:100%;font-size:13px;border-collapse:collapse}
.ctab td{padding:5px 0;border-top:1px solid var(--cream3)}
.ctab td.k{color:var(--text2)}
.ctab td.v{text-align:right;font-weight:700;font-family:var(--mono);color:var(--navy)}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
.note{font-size:11px;color:var(--text3);margin-top:14px;font-style:italic}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Compare stocks</div>
  <div class="h-sub">Valuation &amp; signal, side by side &middot; the strongest is flagged</div>

  <div class="inputs">
    <div class="in-box"><label>Stock 1</label><input type="text" id="c1" value="SQURPHARMA"></div>
    <div class="in-box"><label>Stock 2</label><input type="text" id="c2" value="BXPHARMA"></div>
    <div class="in-box"><label>Stock 3 (optional)</label><input type="text" id="c3" value="RENATA"></div>
    <button class="btn" onclick="compare()">Compare</button>
  </div>

  <div class="grid" id="cmp-out"></div>
  <div class="note" id="cmp-note"></div>
  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script>
const API="https://dsepulse-backend-production.up.railway.app";
const SB_URL="https://hpzaluxjzmgedkplimim.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwemFsdXhqem1nZWRrcGxpbWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Njc3MTYsImV4cCI6MjA5NjI0MzcxNn0.8IpisuYMCkH0LgctY9yeLFlT4YZwW21swCvUU29BDZU";
const sigBg={"STRONG BUY":"var(--green-bg)","BUY":"#F0FDF4","NEUTRAL":"var(--gold-bg)","WATCH":"var(--gold-bg)","SELL":"var(--red-bg)","AVOID":"var(--red-bg)"};
const sigTxt={"STRONG BUY":"var(--green)","BUY":"var(--green)","NEUTRAL":"var(--gold)","WATCH":"var(--gold)","SELL":"var(--red)","AVOID":"var(--red)"};
const N=v=>(v===null||v===undefined||v==="")?null:Number(v);
const fmt=(v,d)=>v===null?"\u2014":Number(v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});

async function sbGet(path){
  try{ const r=await fetch(SB_URL+"/rest/v1/"+path,{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}}); if(!r.ok)return null; return await r.json(); }
  catch(e){ return null; }
}
async function getAnalyse(code){
  try{ const r=await fetch(API+'/api/analyse/'+encodeURIComponent(code)); const j=await r.json(); return (j&&j.score!==undefined)?j:null; }
  catch(e){ return null; }
}

function metricRow(k,v,cls){ return '<tr><td class="k">'+k+'</td><td class="v" style="'+(cls||'')+'">'+v+'</td></tr>'; }

async function compare(){
  const codes=['c1','c2','c3'].map(id=>(document.getElementById(id).value||'').trim().toUpperCase()).filter(Boolean);
  const out=document.getElementById('cmp-out');
  document.getElementById('cmp-note').textContent='';
  if(!codes.length){ out.innerHTML='<div style="font-size:13px;color:var(--text3)">Enter at least one stock code.</div>'; return; }
  out.innerHTML='<div style="font-size:13px;color:var(--text3)">Comparing\u2026</div>';

  const fundArr=await sbGet('fundamentals?code=in.('+encodeURIComponent(codes.join(','))+')&select=*') || [];
  const fundMap={}; fundArr.forEach(f=>{ fundMap[String(f.code).toUpperCase()]=f; });
  const ana=await Promise.all(codes.map(c=>getAnalyse(c)));

  const items=codes.map((c,i)=>{ const f=fundMap[c]||null, a=ana[i]||null;
    return { code:c, f:f, a:a, score:(a&&a.score!==undefined)?N(a.score):null }; });

  const scores=items.map(x=>x.score).filter(s=>s!==null);
  const maxScore=scores.length?Math.max.apply(null,scores):null;
  let hasDiv=false;

  out.innerHTML=items.map(x=>{
    const f=x.f, a=x.a;
    if(!f && !a) return '<div class="card"><div class="c-code">'+x.code+'</div><div class="c-meta" style="margin-top:10px">No data found for this code.</div></div>';
    const name=(f&&f.name)||(a&&a.name)||'';
    const sector=(f&&f.sector)||(a&&a.sector)||'';
    const ltp=(a&&N(a.ltp))!=null?N(a.ltp):(f?N(f.ltp):null);
    const sg=String((a&&(a.sig||a.signal))||'').toUpperCase();
    const isTop=items.length>1 && x.score!==null && x.score===maxScore;
    const pe=f?N(f.pe):null, eps=f?N(f.eps):null, nav=f?N(f.nav):null, roe=f?N(f.roe):null, dy=f?N(f.div_yield):null;
    if(dy!==null) hasDiv=true;
    const roeCls=roe===null?'':'color:'+(roe>=0?'var(--green)':'var(--red)');
    return '<div class="card'+(isTop?' top':'')+'">'
      +(isTop?'<span class="badge">Strongest</span>':'')
      +'<div class="c-code">'+x.code+'</div>'
      +'<div class="c-name">'+(name||'&nbsp;')+'</div>'
      +'<div class="c-meta">'+(sector||'\u2014')+(ltp!=null?' &middot; \u09f3'+fmt(ltp,2):'')+'</div>'
      +(sg?'<div><span class="pill" style="color:'+(sigTxt[sg]||'var(--text2)')+';background:'+(sigBg[sg]||'var(--cream2)')+'">'+sg+'</span></div>':'<div style="height:11px"></div>')
      +'<table class="ctab">'
      + metricRow('Score', x.score!==null?x.score.toFixed(0):'\u2014')
      + metricRow('P / E', fmt(pe,2))
      + metricRow('EPS', (pe===null&&eps===null)?'\u2014':'\u09f3'+fmt(eps,2))
      + metricRow('NAV', nav===null?'\u2014':'\u09f3'+fmt(nav,2))
      + metricRow('ROE', roe===null?'\u2014':fmt(roe,1)+'%', roeCls)
      + metricRow('Div yield', dy===null?'\u2014':fmt(dy,2)+'%')
      +'</table></div>';
  }).join('');

  document.getElementById('cmp-note').innerHTML = hasDiv
    ? 'Score &amp; signal are live from the engines; P/E, EPS, NAV, ROE from the latest fundamentals upload.'
    : 'Score &amp; signal are live from the engines; P/E, EPS, NAV, ROE from the latest fundamentals upload. Dividend yield isn\u2019t in the AmarStock data, so it shows \u2014.';
}
compare();
</script>
</body>
</html>
