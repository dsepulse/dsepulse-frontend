<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fundamentals &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:1200px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.controls input,.controls select{padding:8px 11px;font-size:13px;border:1px solid var(--border2);border-radius:6px;background:var(--white);color:var(--navy)}
.controls input{width:180px}
.count{font-size:11px;color:var(--text3);margin-left:auto}
.collabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin:6px 0 6px}
.colchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{font-size:11px;padding:5px 11px;border:1px solid var(--border2);border-radius:20px;background:var(--white);color:var(--text3);cursor:pointer;user-select:none}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip.locked{background:var(--cream3);color:var(--text2);cursor:default;border-color:var(--border2)}
.tbl-wrap{border:1px solid var(--border);border-radius:10px;overflow:auto;max-height:74vh;background:var(--white)}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;white-space:nowrap}
thead th{position:sticky;top:0;z-index:2;background:var(--navy);color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;padding:10px 12px;text-align:right;cursor:pointer;border-bottom:2px solid var(--navy2)}
thead th.txt{text-align:left}
thead th:hover{background:var(--navy2)}
thead th .arr{color:var(--gold2);margin-left:3px}
tbody td{padding:9px 12px;border-bottom:1px solid var(--cream2);text-align:right;font-family:var(--mono);color:var(--navy)}
tbody td.txt{text-align:left;font-family:'Inter',sans-serif}
tbody td.code{font-weight:700;font-family:var(--mono);color:var(--navy)}
tbody td.name{color:var(--text2);font-weight:500;white-space:normal;min-width:160px}
tbody tr:hover td{background:var(--gold-bg)}
.neg{color:var(--red)} .pos{color:var(--green)}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
.msg{padding:40px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Fundamentals</div>
  <div class="h-sub">Valuation &amp; ownership for every listed stock &middot; pick your columns, sort any column</div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search code or name&hellip;">
    <select id="sector"><option value="">All sectors</option></select>
    <span class="count" id="count"></span>
  </div>

  <div class="collabel">Columns &middot; tap to show / hide</div>
  <div class="colchips" id="colchips"></div>

  <div class="tbl-wrap"><table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table></div>
  <div class="foot">Fundamentals from the latest AmarStock upload &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script>
const SB_URL="https://hpzaluxjzmgedkplimim.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwemFsdXhqem1nZWRrcGxpbWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Njc3MTYsImV4cCI6MjA5NjI0MzcxNn0.8IpisuYMCkH0LgctY9yeLFlT4YZwW21swCvUU29BDZU";

const COLS=[
  {k:"code",         lbl:"Code",       t:"txt",  on:true,  lock:true},
  {k:"name",         lbl:"Name",       t:"name", on:true},
  {k:"sector",       lbl:"Sector",     t:"txt",  on:true},
  {k:"cat",          lbl:"Cat",        t:"txt",  on:false},
  {k:"ltp",          lbl:"LTP",        t:"price",on:true},
  {k:"pe",           lbl:"P/E",        t:"ratio",on:true},
  {k:"eps",          lbl:"EPS",        t:"price",on:true},
  {k:"nav",          lbl:"NAV",        t:"price",on:true},
  {k:"navps",        lbl:"NAV/Price",  t:"ratio",on:false},
  {k:"roe",          lbl:"ROE %",      t:"pct",  on:true},
  {k:"market_cap",   lbl:"Mkt Cap",    t:"big",  on:false},
  {k:"paid_up",      lbl:"Paid-up",    t:"big",  on:false},
  {k:"free_float",   lbl:"Free Float %",t:"pct", on:false},
  {k:"director_pct", lbl:"Director %", t:"pct",  on:false},
  {k:"govt_pct",     lbl:"Govt %",     t:"pct",  on:false},
  {k:"institute_pct",lbl:"Inst %",     t:"pct",  on:false},
  {k:"foreign_pct",  lbl:"Foreign %",  t:"pct",  on:false},
  {k:"public_pct",   lbl:"Public %",   t:"pct",  on:false},
];
const visible=new Set(COLS.filter(c=>c.on).map(c=>c.k));
let ALL=[], sortKey="market_cap", sortDir=-1;

const N=v=>(v===null||v===undefined||v==="")?null:Number(v);
const isTxt=t=>t==="txt"||t==="name";
function fmt(v,t){
  const n=N(v);
  if(t==="txt"||t==="name") return v?String(v):"\u2014";
  if(n===null) return "\u2014";
  if(t==="price") return "\u09f3"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  if(t==="ratio") return n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  if(t==="pct")   return n.toLocaleString("en-US",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
  if(t==="big")   return n.toLocaleString("en-US",{maximumFractionDigits:0});
  return String(v);
}

async function load(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/fundamentals?select=*",{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}});
    ALL = r.ok ? await r.json() : [];
  }catch(e){ ALL=[]; }
  if(!ALL.length){ document.getElementById("tbody").innerHTML='<tr><td colspan="20" class="msg">No fundamentals loaded yet. If you just uploaded, give it a moment and refresh.</td></tr>'; return; }
  const secs=Array.from(new Set(ALL.map(x=>x.sector).filter(Boolean))).sort();
  document.getElementById("sector").innerHTML='<option value="">All sectors</option>'+secs.map(s=>'<option>'+s+'</option>').join("");
  buildChips(); render();
}

function buildChips(){
  document.getElementById("colchips").innerHTML=COLS.map(c=>
    '<span class="chip '+(c.lock?'locked':(visible.has(c.k)?'on':''))+'" data-k="'+c.k+'">'+c.lbl+'</span>'
  ).join("");
  document.querySelectorAll("#colchips .chip").forEach(el=>{
    el.onclick=function(){ const k=el.getAttribute("data-k"); const c=COLS.find(x=>x.k===k); if(c.lock)return;
      if(visible.has(k))visible.delete(k); else visible.add(k);
      el.classList.toggle("on"); render(); };
  });
}

function setSort(k){ if(sortKey===k){sortDir=-sortDir;} else {sortKey=k;sortDir=(COLS.find(c=>c.k===k).t==="txt"||COLS.find(c=>c.k===k).t==="name")?1:-1;} render(); }

function render(){
  const cols=COLS.filter(c=>visible.has(c.k));
  const q=(document.getElementById("search").value||"").toUpperCase().trim();
  const sf=document.getElementById("sector").value;
  let rows=ALL.filter(x=>{
    if(sf && x.sector!==sf) return false;
    if(q && String(x.code||"").toUpperCase().indexOf(q)<0 && String(x.name||"").toUpperCase().indexOf(q)<0) return false;
    return true;
  });
  const col=COLS.find(c=>c.k===sortKey);
  const txt=col&&isTxt(col.t);
  rows.sort((a,b)=>{
    let va=a[sortKey], vb=b[sortKey];
    if(txt){ va=String(va||""); vb=String(vb||""); return va<vb?-sortDir:va>vb?sortDir:0; }
    va=N(va); vb=N(vb);
    if(va===null&&vb===null)return 0; if(va===null)return 1; if(vb===null)return -1;
    return (va-vb)*sortDir;
  });
  document.getElementById("thead").innerHTML=cols.map(c=>{
    const arr=sortKey===c.k?'<span class="arr">'+(sortDir>0?"\u25B2":"\u25BC")+'</span>':'';
    return '<th class="'+(isTxt(c.t)?'txt':'')+'" data-k="'+c.k+'">'+c.lbl+arr+'</th>';
  }).join("");
  document.querySelectorAll("#thead th").forEach(el=>{ el.onclick=function(){ setSort(el.getAttribute("data-k")); }; });
  document.getElementById("tbody").innerHTML=rows.map(x=>'<tr>'+cols.map(c=>{
    let cls=isTxt(c.t)?'txt':''; if(c.k==="code")cls='code'; if(c.k==="name")cls='name';
    let extra=''; if(c.t==="pct"||c.k==="roe"){ const n=N(x[c.k]); if(n!==null)extra=n>=0?'pos':'neg'; }
    return '<td class="'+cls+' '+extra+'">'+fmt(x[c.k],c.t)+'</td>';
  }).join("")+'</tr>').join("");
  document.getElementById("count").textContent=rows.length+" of "+ALL.length+" stocks";
}

document.getElementById("search").oninput=render;
document.getElementById("sector").onchange=render;
load();
</script>
</body>
</html>
