<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Market Pulse &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.c-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.c-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--navy);margin-top:4px}
.c-sub{font-size:12px;margin-top:2px}
.section{margin-bottom:22px}
.breadth{display:flex;height:14px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.b-leg{display:flex;justify-content:space-between;font-size:12px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px}
.heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(134px,1fr));gap:10px}
.tile{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 14px 12px;display:flex;flex-direction:column;gap:9px;transition:border-color .15s,box-shadow .15s}
.tile:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(13,31,60,0.05)}
.tile .t-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.tile .t-n{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);line-height:1.25}
.tile .t-rank{font-size:9px;font-family:var(--mono);color:var(--text3);flex-shrink:0;padding-top:1px}
.tile .t-v{font-size:26px;font-weight:800;font-family:var(--mono);line-height:1}
.tile .t-bar{height:5px;border-radius:3px;background:var(--cream2);overflow:hidden}
.tile .t-bar i{display:block;height:100%;border-radius:3px;min-width:0}
.tile .t-meta{font-size:9px;color:var(--text3);display:flex;justify-content:space-between;letter-spacing:0.2px}
.tbl{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.thead,.trow{display:grid;grid-template-columns:1fr 80px 90px 130px 110px;gap:8px;padding:9px 18px;align-items:center}
.thead{background:var(--cream2);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.thead div:nth-child(2),.thead div:nth-child(3){text-align:right}
.thead div:nth-child(5){text-align:center}
.trow{border-bottom:1px solid var(--border)}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Market Pulse</div>
  <div class="h-sub" id="m-date">Loading the market&hellip;</div>

  <div class="cards" id="m-cards"></div>

  <div class="section">
    <div class="lbl">Market breadth</div>
    <div class="breadth" id="m-breadth"></div>
    <div class="b-leg" id="m-breadth-leg"></div>
  </div>

  <div class="section" id="m-sectors-wrap" style="display:none">
    <div class="lbl">Hot &amp; cold sectors</div>
    <div class="pills" id="m-hotcold"></div>
  </div>

  <div class="section">
    <div class="lbl">Top movers</div>
    <div id="m-movers" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px"></div>
  </div>

  <div class="section">
    <div class="lbl">Most active &middot; by turnover</div>
    <div class="tbl"><div id="m-active"></div></div>
  </div>

  <div class="section">
    <div class="lbl">Market outlook</div>
    <div id="m-outlook"></div>
  </div>

  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script>
const API="https://dsepulse-backend-production.up.railway.app";
const sigBg={"STRONG BUY":"var(--green-bg)","BUY":"#F0FDF4","NEUTRAL":"var(--gold-bg)","SELL":"var(--red-bg)"};
const sigTxt={"STRONG BUY":"var(--green)","BUY":"var(--green)","NEUTRAL":"var(--gold)","SELL":"var(--red)"};

function scoreTier(v){
  if(v>=60) return 'var(--green)';
  if(v>=45) return 'var(--gold)';
  if(v>=30) return 'var(--navy2)';
  if(v>0)   return 'var(--text3)';
  return 'var(--border2)';
}
async function getJSON(p){ try{ const r=await fetch(API+p); return await r.json(); }catch(e){ return null; } }

async function load(){
  const [ov,all]=await Promise.all([getJSON('/api/dashboard/overview'), getJSON('/api/bd/all')]);
  const m=(ov&&ov.market)||{};
  const list=Array.isArray(all)?all:[];

  const ds=document.getElementById('m-date');
  ds.textContent=(ov&&ov.updated?ov.updated+' \u00b7 ':'')+'whole-market snapshot';

  const dchg=Number(m.dsex_change||0), dcol=dchg>=0?'var(--green)':'var(--red)';
  function idxCard(label,val,chg){ if(!val) return ''; var col=Number(chg)>=0?'var(--green)':'var(--red)'; return '<div class="card"><div class="c-lbl">'+label+'</div><div class="c-val">'+Number(val).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})+'</div><div class="c-sub" style="color:'+col+'">'+(Number(chg)>=0?'\u25b2':'\u25bc')+' '+Math.abs(Number(chg)).toFixed(2)+'%</div></div>'; }
  const cards=[];
  if(m.dsex) cards.push(idxCard('DSEX',m.dsex,dchg));
  if(m.dses) cards.push(idxCard('DSES \u00b7 Shariah',m.dses,m.dses_change));
  if(m.ds30) cards.push(idxCard('DS30',m.ds30,m.ds30_change));
  cards.push('<div class="card"><div class="c-lbl">Market mood</div><div class="c-val" style="font-family:var(--serif);font-size:20px;color:'+(m.mood==='Bullish'?'var(--green)':m.mood==='Bearish'?'var(--red)':'var(--gold)')+'">'+(m.mood||'\u2014')+'</div></div>');
  if(m.turnover){
    var tc=Number(m.turnover)/10, ptc=Number(m.prev_turnover||0)/10, tsub='';
    if(ptc>0){ var dp=(tc-ptc)/ptc*100; tsub='<div class="c-sub" style="color:'+(dp>=0?'var(--green)':'var(--red)')+'">'+(dp>=0?'\u25b2':'\u25bc')+' '+Math.abs(dp).toFixed(0)+'% vs yest</div>'; }
    cards.push('<div class="card"><div class="c-lbl">Turnover</div><div class="c-val">\u09f3'+tc.toLocaleString('en-US',{maximumFractionDigits:0})+' cr</div>'+tsub+'</div>');
  }
  (function(){
    var net=Number(m.adv||0)-Number(m.dec||0), pnet=Number(m.prev_adv||0)-Number(m.prev_dec||0), bsub='';
    if(m.prev_adv||m.prev_dec){ var dn=net-pnet; bsub='<div class="c-sub" style="color:'+(dn>=0?'var(--green)':'var(--red)')+'">'+(dn>=0?'\u25b2':'\u25bc')+' '+(dn>=0?'+':'')+dn+' net vs yest</div>'; }
    cards.push('<div class="card"><div class="c-lbl">Breadth</div><div class="c-val" style="font-size:18px"><span style="color:var(--green)">\u25b2'+(m.adv||0)+'</span> / <span style="color:var(--red)">\u25bc'+(m.dec||0)+'</span></div>'+bsub+'</div>');
  })();
  document.getElementById('m-cards').innerHTML=cards.join('');

  const a=Number(m.adv||0),d=Number(m.dec||0),u=Number(m.unch||0),tot=a+d+u||1;
  document.getElementById('m-breadth').innerHTML=
    '<div style="width:'+(a/tot*100)+'%;background:var(--green)"></div>'+
    '<div style="width:'+(u/tot*100)+'%;background:var(--text3)"></div>'+
    '<div style="width:'+(d/tot*100)+'%;background:var(--red)"></div>';
  document.getElementById('m-breadth-leg').innerHTML=
    '<span style="color:var(--green)">'+a+' advancing</span><span style="color:var(--text3)">'+u+' unchanged</span><span style="color:var(--red)">'+d+' declining</span>';

  const hot=Array.isArray(m.hot)?m.hot:[], cold=Array.isArray(m.cold)?m.cold:[];
  if(hot.length||cold.length){
    document.getElementById('m-sectors-wrap').style.display='block';
    const hp=hot.map(s=>'<span class="pill" style="color:var(--green);background:var(--green-bg)">'+s+'</span>').join('');
    const cp=cold.map(s=>'<span class="pill" style="color:var(--red);background:var(--red-bg)">'+s+'</span>').join('');
    document.getElementById('m-hotcold').innerHTML=hp+cp;
  }

  // ── Market outlook: rule-based read of today's momentum & breadth ──
  (function(){
    var dchg=Number(m.dsex_change||0);
    var a=Number(m.adv||0), d=Number(m.dec||0);
    var turnCr=Number(m.turnover||0)/10;
    var idxVals=[m.dsex,m.dses,m.ds30].filter(function(x){return Number(x)>0;});
    var idxN=idxVals.length||1;
    var ups=[m.dsex_change,m.dses_change,m.ds30_change].filter(function(x,i){return Number([m.dsex,m.dses,m.ds30][i])>0 && Number(x)>0;}).length;
    var strong=list.filter(function(r){return (r.signal||'').toUpperCase()==='STRONG BUY';}).length;

    var sc=0;
    sc += dchg>0.5?2:dchg>0?1:dchg<-0.5?-2:dchg<0?-1:0;
    sc += a>d*1.3?2:a>d?1:d>a*1.3?-2:d>a?-1:0;
    sc += ups>=idxN?1:ups===0?-1:0;

    var label,col,bg,head;
    if(sc>=4){label='Bullish';col='var(--green)';bg='var(--green-bg)';head='Broad strength across the market.';}
    else if(sc>=2){label='Mildly positive';col='var(--green)';bg='var(--green-bg)';head='A modest upward lean.';}
    else if(sc>=1){label='Cautiously positive';col='var(--gold)';bg='var(--gold-bg)';head='Slightly positive, not decisive.';}
    else if(sc===0){label='Neutral / mixed';col='var(--gold)';bg='var(--gold-bg)';head='No clear direction today.';}
    else if(sc>=-2){label='Soft / cautious';col='var(--red)';bg='var(--red-bg)';head='Leaning weak.';}
    else {label='Bearish';col='var(--red)';bg='var(--red-bg)';head='Broad weakness across the market.';}

    var idxLine='DSEX '+(dchg>=0?'+':'')+dchg.toFixed(2)+'%';
    if(m.dses) idxLine+=', DSES '+(Number(m.dses_change)>=0?'+':'')+Number(m.dses_change).toFixed(2)+'%';
    if(m.ds30) idxLine+=', DS30 '+(Number(m.ds30_change)>=0?'+':'')+Number(m.ds30_change).toFixed(2)+'%';
    var agree=ups>=idxN?'the indices moved up together':ups===0?'the indices were all soft':'the indices were mixed';

    var breadth;
    if(a>d*1.3) breadth='breadth was firmly positive ('+a+' up vs '+d+' down), confirming the move';
    else if(a>d) breadth='breadth was mildly positive ('+a+' up vs '+d+' down)';
    else if(d>a*1.3) breadth='breadth was firmly negative ('+d+' down vs '+a+' up)';
    else if(d>a) breadth='breadth was mildly negative ('+d+' down vs '+a+' up)';
    else breadth='breadth was roughly even ('+a+' up / '+d+' down)';

    var diverge='';
    if(dchg>0 && d>a) diverge=' Watch the divergence \u2014 the index rose while more stocks fell, which often means the gain is leaning on a few large caps rather than the broad market.';
    else if(dchg<0 && a>d) diverge=' Interesting divergence \u2014 the index fell while more stocks actually rose, so large-cap weakness is masking steadier broad-market action.';

    var turnTxt=turnCr>=1000?'healthy turnover (\u09f3'+turnCr.toFixed(0)+' cr) is behind it':
                turnCr>=500?'turnover was moderate (\u09f3'+turnCr.toFixed(0)+' cr)':
                'turnover was thin (\u09f3'+turnCr.toFixed(0)+' cr), so conviction behind the move is limited';

    var read='Today '+idxLine+' \u2014 '+agree+'. '+strong+' stock'+(strong!==1?'s are':' is')+' on a Strong Buy, '+breadth+', and '+turnTxt+'.'+diverge;

    var watch;
    if(sc>=2) watch='For this to extend, breadth needs to stay positive and turnover hold up next session. If advancers thin out or turnover drops, the momentum is fading.';
    else if(sc<=-2) watch='A turnaround would need breadth to flip positive and turnover to return. Until then pressure stays on the downside \u2014 watch whether the index holds the current level.';
    else watch='Direction is unsettled. Next session, expanding advancers and rising turnover would tilt it up; shrinking breadth and thin volume would tilt it down.';

    document.getElementById('m-outlook').innerHTML=
      '<div class="card" style="padding:16px 18px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">'
      +'<span style="padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:'+col+';background:'+bg+'">'+label+'</span>'
      +'<span style="font-size:13px;color:var(--text2)">'+head+'</span></div>'
      +'<p style="font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:12px">'+read+'</p>'
      +'<div style="font-size:12.5px;line-height:1.6;color:var(--navy);background:var(--cream2);border-radius:8px;padding:11px 13px"><b>What to watch next session:</b> '+watch+'</div>'
      +'<div style="font-size:10.5px;color:var(--text3);margin-top:10px">A data-driven read of today\u2019s momentum and breadth \u2014 not a forecast or investment advice.</div>'
      +'</div>';
  })();

  // Top gainers / losers (from the scanned universe)
  (function(){
    var withPct=list.filter(function(r){return r.pct!==undefined && r.pct!==null && !isNaN(Number(r.pct));});
    var g=withPct.slice().sort(function(a,b){return Number(b.pct)-Number(a.pct);}).slice(0,5);
    var l=withPct.slice().sort(function(a,b){return Number(a.pct)-Number(b.pct);}).slice(0,5);
    function rows(arr){
      return arr.map(function(r){
        var p=Number(r.pct||0), pc=p>=0?'var(--green)':'var(--red)';
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">'
          +'<span style="font-weight:700;font-family:var(--mono);color:var(--navy)">'+r.code+'</span>'
          +'<span style="font-family:var(--mono);color:var(--text3)">\u09f3'+Number(r.ltp||0).toFixed(2)+'</span>'
          +'<span style="font-weight:700;font-family:var(--mono);color:'+pc+'">'+(p>=0?'+':'')+p.toFixed(2)+'%</span>'
          +'</div>';
      }).join('') || '<div style="font-size:12px;color:var(--text3);padding:6px 0">No data.</div>';
    }
    var mv=document.getElementById('m-movers'); if(mv) mv.innerHTML=
      '<div class="card" style="padding:12px 14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--green);margin-bottom:4px">Top gainers</div>'+rows(g)+'</div>'
      +'<div class="card" style="padding:12px 14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--red);margin-bottom:4px">Top losers</div>'+rows(l)+'</div>';
  })();

  // Most active by turnover
  (function(){
    var withVal=list.filter(function(r){return Number(r.value||0)>0;}).sort(function(a,b){return Number(b.value)-Number(a.value);}).slice(0,6);
    var el=document.getElementById('m-active'); if(!el) return;
    el.innerHTML='<div style="display:grid;grid-template-columns:1fr 92px 80px 78px;gap:8px;padding:9px 16px;background:var(--cream2);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text3)"><div>Stock</div><div style="text-align:right">Turnover</div><div style="text-align:right">LTP</div><div style="text-align:right">Chg</div></div>'
      +(withVal.map(function(r,i){
        var p=Number(r.pct||0), pc=p>=0?'var(--green)':'var(--red)', cr=Number(r.value||0)/10;
        var last=i===withVal.length-1?';border-bottom:none':'';
        return '<div style="display:grid;grid-template-columns:1fr 92px 80px 78px;gap:8px;padding:9px 16px;align-items:center;border-bottom:1px solid var(--border)'+last+'">'
          +'<div style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">'+r.code+(r.cat?' <span style="font-size:9px;padding:1px 5px;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text3)">'+r.cat+'</span>':'')+'</div>'
          +'<div style="text-align:right;font-size:12px;font-family:var(--mono);color:var(--navy);font-weight:700">\u09f3'+cr.toLocaleString('en-US',{maximumFractionDigits:1})+' cr</div>'
          +'<div style="text-align:right;font-size:12px;font-family:var(--mono);color:var(--text3)">\u09f3'+Number(r.ltp||0).toFixed(2)+'</div>'
          +'<div style="text-align:right;font-size:12px;font-family:var(--mono);font-weight:700;color:'+pc+'">'+(p>=0?'+':'')+p.toFixed(2)+'%</div>'
          +'</div>';
      }).join('') || '<div style="font-size:12px;color:var(--text3);padding:10px 16px">No data.</div>');
  })();

  if(!list.length){ ds.textContent='Could not load market data right now.'; }
}
load();
</script>
</body>
</html>
