<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Market Pulse &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.c-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.c-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--navy);margin-top:4px}
.c-sub{font-size:12px;margin-top:2px}
.section{margin-bottom:22px}
.breadth{display:flex;height:14px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.b-leg{display:flex;justify-content:space-between;font-size:12px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px}
.heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(134px,1fr));gap:10px}
.tile{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 14px 12px;display:flex;flex-direction:column;gap:9px;transition:border-color .15s,box-shadow .15s}
.tile:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(13,31,60,0.05)}
.tile .t-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.tile .t-n{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);line-height:1.25}
.tile .t-rank{font-size:9px;font-family:var(--mono);color:var(--text3);flex-shrink:0;padding-top:1px}
.tile .t-v{font-size:26px;font-weight:800;font-family:var(--mono);line-height:1}
.tile .t-bar{height:5px;border-radius:3px;background:var(--cream2);overflow:hidden}
.tile .t-bar i{display:block;height:100%;border-radius:3px;min-width:0}
.tile .t-meta{font-size:9px;color:var(--text3);display:flex;justify-content:space-between;letter-spacing:0.2px}
.tbl{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.thead,.trow{display:grid;grid-template-columns:1fr 80px 90px 130px 110px;gap:8px;padding:9px 18px;align-items:center}
.thead{background:var(--cream2);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.thead div:nth-child(2),.thead div:nth-child(3){text-align:right}
.thead div:nth-child(5){text-align:center}
.trow{border-bottom:1px solid var(--border)}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Market Pulse</div>
  <div class="h-sub" id="m-date">Loading the market&hellip;</div>

  <div class="cards" id="m-cards"></div>

  <div class="section">
    <div class="lbl">Market breadth</div>
    <div class="breadth" id="m-breadth"></div>
    <div class="b-leg" id="m-breadth-leg"></div>
  </div>

  <div class="section" id="m-sectors-wrap" style="display:none">
    <div class="lbl">Hot &amp; cold sectors</div>
    <div class="pills" id="m-hotcold"></div>
  </div>

  <div class="section">
    <div class="lbl">Sector strength &middot; average signal score</div>
    <div class="heat" id="m-heat"></div>
  </div>

  <div class="section">
    <div class="lbl">Strongest setups today</div>
    <div class="tbl">
      <div class="thead"><div>Stock</div><div>Score</div><div>LTP</div><div>Sector</div><div style="text-align:center">Signal</div></div>
      <div id="m-rows"></div>
    </div>
  </div>

  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script>
const API="https://dsepulse-backend-production.up.railway.app";
const sigBg={"STRONG BUY":"var(--green-bg)","BUY":"#F0FDF4","NEUTRAL":"var(--gold-bg)","SELL":"var(--red-bg)"};
const sigTxt={"STRONG BUY":"var(--green)","BUY":"var(--green)","NEUTRAL":"var(--gold)","SELL":"var(--red)"};

function scoreTier(v){
  if(v>=60) return 'var(--green)';
  if(v>=45) return 'var(--gold)';
  if(v>=30) return 'var(--navy2)';
  if(v>0)   return 'var(--text3)';
  return 'var(--border2)';
}
async function getJSON(p){ try{ const r=await fetch(API+p); return await r.json(); }catch(e){ return null; } }

async function load(){
  const [ov,all]=await Promise.all([getJSON('/api/dashboard/overview'), getJSON('/api/bd/all')]);
  const m=(ov&&ov.market)||{};
  const list=Array.isArray(all)?all:[];

  const ds=document.getElementById('m-date');
  ds.textContent=(ov&&ov.updated?ov.updated+' \u00b7 ':'')+'whole-market snapshot';

  const dchg=Number(m.dsex_change||0), dcol=dchg>=0?'var(--green)':'var(--red)';
  const cards=[];
  if(m.dsex) cards.push('<div class="card"><div class="c-lbl">DSEX</div><div class="c-val">'+Number(m.dsex).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})+'</div><div class="c-sub" style="color:'+dcol+'">'+(dchg>=0?'\u25b2':'\u25bc')+' '+Math.abs(dchg).toFixed(2)+'%</div></div>');
  cards.push('<div class="card"><div class="c-lbl">Market mood</div><div class="c-val" style="font-family:var(--serif);font-size:20px;color:'+(m.mood==='Bullish'?'var(--green)':m.mood==='Bearish'?'var(--red)':'var(--gold)')+'">'+(m.mood||'\u2014')+'</div></div>');
  if(m.turnover) cards.push('<div class="card"><div class="c-lbl">Turnover</div><div class="c-val">\u09f3'+Number(m.turnover/10).toLocaleString('en-US',{maximumFractionDigits:0})+' cr</div></div>');
  cards.push('<div class="card"><div class="c-lbl">Breadth</div><div class="c-val" style="font-size:18px"><span style="color:var(--green)">\u25b2'+(m.adv||0)+'</span> / <span style="color:var(--red)">\u25bc'+(m.dec||0)+'</span></div></div>');
  document.getElementById('m-cards').innerHTML=cards.join('');

  const a=Number(m.adv||0),d=Number(m.dec||0),u=Number(m.unch||0),tot=a+d+u||1;
  document.getElementById('m-breadth').innerHTML=
    '<div style="width:'+(a/tot*100)+'%;background:var(--green)"></div>'+
    '<div style="width:'+(u/tot*100)+'%;background:var(--text3)"></div>'+
    '<div style="width:'+(d/tot*100)+'%;background:var(--red)"></div>';
  document.getElementById('m-breadth-leg').innerHTML=
    '<span style="color:var(--green)">'+a+' advancing</span><span style="color:var(--text3)">'+u+' unchanged</span><span style="color:var(--red)">'+d+' declining</span>';

  const hot=Array.isArray(m.hot)?m.hot:[], cold=Array.isArray(m.cold)?m.cold:[];
  if(hot.length||cold.length){
    document.getElementById('m-sectors-wrap').style.display='block';
    const hp=hot.map(s=>'<span class="pill" style="color:var(--green);background:var(--green-bg)">'+s+'</span>').join('');
    const cp=cold.map(s=>'<span class="pill" style="color:var(--red);background:var(--red-bg)">'+s+'</span>').join('');
    document.getElementById('m-hotcold').innerHTML=hp+cp;
  }

  const agg={};
  list.forEach(r=>{ const s=r.sector||'Other'; if(!agg[s])agg[s]={sum:0,n:0}; agg[s].sum+=Number(r.score||0); agg[s].n++; });
  const secs=Object.keys(agg).map(s=>({s:s,avg:agg[s].sum/agg[s].n,n:agg[s].n})).filter(x=>x.n>=2).sort((a,b)=>b.avg-a.avg);
  document.getElementById('m-heat').innerHTML=secs.map(function(x,i){
    var v=x.avg, col=scoreTier(v), w=Math.max(Math.min(v,100),0);
    var numCol=v>0?col:'var(--text3)';
    return '<div class="tile">'
      +'<div class="t-head"><div class="t-n">'+x.s+'</div><div class="t-rank">#'+(i+1)+'</div></div>'
      +'<div class="t-v" style="color:'+numCol+'">'+v.toFixed(0)+'</div>'
      +'<div class="t-bar"><i style="width:'+w+'%;background:'+col+'"></i></div>'
      +'<div class="t-meta"><span>'+x.n+' stock'+(x.n!==1?'s':'')+'</span><span>avg signal</span></div>'
      +'</div>';
  }).join('') || '<div style="font-size:13px;color:var(--text3)">Sector data unavailable.</div>';

  const top=list.slice().sort((a,b)=>Number(b.score||0)-Number(a.score||0)).slice(0,8);
  const el=document.getElementById('m-rows');
  el.innerHTML=top.map((r,i)=>{
    const sc=Number(r.score||0),ltp=Number(r.ltp||0),sg=r.signal||'',sec=r.sector||'';
    const scC=sc>=70?'var(--green)':sc>=55?'#1A6B3C':sc>=40?'var(--gold)':'var(--red)';
    const last=i===top.length-1?';border-bottom:none':'';
    return '<div class="trow" style="'+(last?last.slice(1):'')+'">'
      +'<div><span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">'+r.code+'</span>'+(r.cat?' <span style="font-size:9px;padding:1px 6px;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text3)">'+r.cat+'</span>':'')+'</div>'
      +'<div style="text-align:right;font-size:13px;font-weight:800;font-family:var(--mono);color:'+scC+'">'+sc.toFixed(0)+'</div>'
      +'<div style="text-align:right;font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">\u09f3'+ltp.toFixed(2)+'</div>'
      +'<div style="font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+sec+'</div>'
      +'<div style="text-align:center"><span style="padding:3px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:'+(sigTxt[sg]||'var(--text2)')+';background:'+(sigBg[sg]||'var(--cream2)')+';border:1px solid currentColor;border-radius:4px;opacity:0.85">'+sg+'</span></div>'
      +'</div>';
  }).join('');
  if(!list.length){ ds.textContent='Could not load market data right now.'; }
}
load();
</script>
</body>
</html>
