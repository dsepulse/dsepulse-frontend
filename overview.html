<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Overview &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
@media(max-width:680px){#ov-grid{grid-template-columns:1fr !important}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Overview</div>
  <div class="h-sub">Market snapshot &middot; today's strongest signal &middot; cross-tool consensus</div>

  <div id="dt-overview">
    <div id="ov-market"></div>
    <div id="ov-top"></div>
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-top:16px" id="ov-grid">
      <div id="ov-funnel"></div>
      <div id="ov-consensus"></div>
    </div>
  </div>

  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script>
const API="https://dsepulse-backend-production.up.railway.app";

async function buildOverview(){
  const el=document.getElementById('dt-overview');if(!el)return;
  const mk=document.getElementById('ov-market');
  mk.innerHTML='<div style="padding:30px;text-align:center;color:var(--text3);font-size:12px">Loading overview\u2026</div>';
  let d=null,status='no response';
  try{
    const r=await fetch(API+'/api/dashboard/overview');
    status='HTTP '+r.status;
    if(r.ok) d=await r.json();
  }catch(e){ status='network/CORS error: '+e.message; }
  if(!d||!d.market){
    mk.innerHTML='<div style="padding:30px;text-align:center;color:var(--text3);font-size:12px;border:1px dashed var(--border);border-radius:10px">Overview data not available.<br><span style="font-family:var(--mono);font-size:11px;color:var(--text2)">'+status+(d?' \u00b7 got JSON but no .market field':'')+'</span><br><span style="font-size:11px">If the others work, this endpoint may just be slow or waiting on today\u2019s upload \u2014 refresh in a minute.</span></div>';
    return;
  }
  try{
  const m=d.market,fn=d.funnel||{},t=d.top_signal,cons=d.consensus||[];
  const fmtD=s=>{try{return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();}catch(e){return s||'';}};
  const moodC=m.mood==='Bullish'?'#4ADE80':m.mood==='Bearish'?'#F87171':'var(--gold2)';
  const L='font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5)';
  const DIV='<div style="height:34px;width:1px;background:rgba(255,255,255,0.15)"></div>';
  const sect=(arr,lbl,col)=>arr&&arr.length?`<div style="display:flex;flex-direction:column;gap:3px"><span style="${L}">${lbl}</span><span style="font-size:12px;font-weight:600;color:${col}">${arr.join(' · ')}</span></div>`:'';
  const dsexC=(m.dsex_change||0)>=0?'#4ADE80':'#F87171';
  const dsexBlk=(m.dsex>0)?`<div style="display:flex;flex-direction:column;gap:2px"><span style="${L}">DSEX Index</span><span style="font-size:20px;font-weight:800;font-family:var(--mono);color:#fff;line-height:1.1">${m.dsex.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})} <span style="font-size:12px;color:${dsexC}">${(m.dsex_change||0)>=0?'▲':'▼'}${Math.abs(m.dsex_change||0).toFixed(2)}%</span></span></div>${DIV}`:'';
  const turnBlk=(m.turnover>0)?`${DIV}<div style="display:flex;flex-direction:column;gap:2px"><span style="${L}">Turnover</span><span style="font-size:14px;font-weight:700;font-family:var(--mono);color:#fff">৳${(m.turnover/10).toLocaleString('en-US',{maximumFractionDigits:0})} cr</span></div>`:'';
  document.getElementById('ov-market').innerHTML=`<div style="background:var(--navy);border-radius:10px;padding:16px 22px;display:flex;align-items:center;gap:22px;flex-wrap:wrap">
    ${dsexBlk}
    <div style="display:flex;flex-direction:column;gap:2px"><span style="${L}">Market Mood</span><span style="font-size:20px;font-weight:800;font-family:var(--serif);color:${moodC}">${m.mood}</span></div>
    ${DIV}
    <div style="display:flex;flex-direction:column;gap:2px"><span style="${L}">Breadth</span><span style="font-size:14px;font-weight:700;font-family:var(--mono)"><span style="color:#4ADE80">▲${m.adv}</span> <span style="color:rgba(255,255,255,0.4)">/</span> <span style="color:#F87171">▼${m.dec}</span> <span style="color:rgba(255,255,255,0.4);font-size:11px">· ${m.unch} unch</span></span></div>
    ${turnBlk}
    ${m.hot&&m.hot.length?DIV+sect(m.hot,'Hot Sectors','#4ADE80'):''}
    ${sect(m.cold,'Cold Sectors','#F87171')}
    <div style="margin-left:auto;text-align:right"><span style="${L}">Updated</span><br><span style="font-size:11px;font-family:var(--mono);color:rgba(255,255,255,0.7)">${d.updated_time||(d.updated?fmtD(d.updated):'—')}</span></div>
  </div>`;
  if(t){
    const pc=t.pct>=0?'var(--green)':'var(--red)';
    const chip=(lbl,val)=>`<div style="display:flex;flex-direction:column;gap:1px;align-items:center;padding:0 14px"><span style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)">${lbl}</span><span style="font-size:14px;font-weight:800;font-family:var(--mono);color:var(--navy)">${val}</span></div>`;
    const lvl=(lbl,val,col)=>`<div style="flex:1;text-align:center;padding:8px 4px;background:var(--white);border:1px solid var(--border);border-radius:6px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)">${lbl}</div><div style="font-size:14px;font-weight:800;font-family:var(--mono);color:${col}">${val}</div></div>`;
    document.getElementById('ov-top').innerHTML=`<div style="background:linear-gradient(135deg,var(--gold-bg),var(--white));border:1px solid var(--gold-border);border-radius:10px;padding:20px 22px;margin-top:16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:10px">★ Today's Strongest Signal</div>
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-size:26px;font-weight:800;font-family:var(--serif);color:var(--navy)">${t.code}</span>
        <span style="font-size:10px;padding:2px 8px;background:var(--cream2);border:1px solid var(--border);border-radius:4px;color:var(--text3)">${t.cat||''}</span>
        <span style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--navy)">৳${t.ltp.toFixed(2)}</span>
        <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:${pc}">${t.pct>=0?'+':''}${t.pct.toFixed(2)}%</span>
        <div style="margin-left:auto;display:flex;align-items:center;border:1px solid var(--gold-border);border-radius:8px;background:var(--white)">${chip('Picker',t.picker.toFixed(0))}<div style="width:1px;height:24px;background:var(--border)"></div>${chip('WMA',t.wma||'—')}<div style="width:1px;height:24px;background:var(--border)"></div>${chip('Tech',t.tech.toFixed(0))}</div>
      </div>
      <div style="display:flex;gap:8px">${lvl('Entry','৳'+t.entry.toFixed(2),'var(--navy)')}${lvl('Target','৳'+t.target.toFixed(2),'var(--green)')}${lvl('Stop Loss','৳'+t.sl.toFixed(2),'var(--red)')}${lvl('Risk : Reward','1:'+t.rr.toFixed(1),'var(--gold)')}</div>
    </div>`;
  }else{
    document.getElementById('ov-top').innerHTML=`<div style="background:var(--cream);border:1px dashed var(--border);border-radius:10px;padding:24px;margin-top:16px;text-align:center"><div style="font-size:13px;font-weight:600;color:var(--text2)">No triple-confirmed signal today</div><div style="font-size:11px;color:var(--text3);margin-top:4px">In a cautious market the engines hold back — check the BD Signal tab for the watchlist.</div></div>`;
  }
  const steps=[['Stocks scanned',fn.scanned||0,'var(--navy)'],['WMA strong buy',fn.wma_strong||0,'var(--gold)'],['Tech 70+',fn.tech70||0,'var(--green-bright)'],['Triple-confirmed',fn.combined||0,'var(--green)']];
  const mx=Math.max(fn.scanned||1,1);
  document.getElementById('ov-funnel').innerHTML=`<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;height:100%">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);font-weight:700;margin-bottom:14px">Confirmation Funnel</div>
    ${steps.map(s=>{const w=Math.max((s[1]/mx)*100,6);return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:var(--text2)">${s[0]}</span><span style="font-size:12px;font-weight:800;font-family:var(--mono);color:${s[2]}">${s[1]}</span></div><div style="height:8px;background:var(--cream2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${w}%;background:${s[2]};border-radius:4px"></div></div></div>`;}).join('')}
    <div style="font-size:10px;color:var(--text3);margin-top:8px;font-style:italic">Each layer filters for higher conviction.</div>
  </div>`;
  const eg={Combined:'var(--green)',WMA:'var(--gold)',Tech:'var(--green-bright)',BD:'var(--navy2)'};
  document.getElementById('ov-consensus').innerHTML=`<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;height:100%">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);font-weight:700;margin-bottom:10px">Cross-Tool Consensus</div>
    ${cons.length?cons.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy);width:80px">${c.code}</span><div style="display:flex;gap:4px;flex:1;flex-wrap:wrap">${c.engines.map(e=>`<span style="font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:3px;color:#fff;background:${eg[e]||'var(--text3)'}">${e}</span>`).join('')}</div><span style="font-size:13px;font-weight:800;font-family:var(--mono);color:var(--green)">${c.count}<span style="font-size:9px;color:var(--text3)">/4</span></span></div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:14px 0;text-align:center">No multi-engine overlaps today.</div>'}
  </div>`;
  }catch(e){
    mk.innerHTML='<div style="padding:30px;text-align:center;color:var(--red);font-size:12px;border:1px dashed var(--red-bg);border-radius:10px">Render error: <span style="font-family:var(--mono)">'+e.message+'</span></div>';
  }
}
buildOverview();
</script>
</body>
</html>
