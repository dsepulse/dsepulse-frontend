<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Screener &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:8px}
.filters{padding:16px 18px;margin-bottom:14px}
.f-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;align-items:end}
.f-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);display:block;margin-bottom:5px}
select,input[type=number]{width:100%;padding:8px 10px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--navy);font-family:var(--mono)}
input[type=range]{width:100%}
.bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.cnt{font-size:11px;color:var(--text3)}
.rank{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.thead{position:sticky;top:0;z-index:2;display:grid;-template-columns:1fr 80px 90px 130px 110px;gap:8px;padding:9px 18px;background:var(--cream2);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.thead div:nth-child(2),.thead div:nth-child(3){text-align:right}
.thead div:nth-child(5){text-align:center}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Screener</div>
  <div class="h-sub">Filter the whole market by signal, score, sector and price &middot; ranked by conviction</div>

  <div class="card filters">
    <div class="f-grid">
      <div><label class="f-lbl">Signal</label>
        <select id="scr-sig" onchange="scrRender()"><option value="all">All signals</option><option value="buy" selected>Buy or better</option><option value="strong">Strong Buy only</option></select></div>
      <div><label class="f-lbl">Sector</label>
        <select id="scr-sector" onchange="scrRender()"><option value="all">All sectors</option></select></div>
      <div><label class="f-lbl">Min score &middot; <span id="scr-score-out">55</span></label>
        <input id="scr-score" type="range" min="0" max="100" value="55" step="5" oninput="scrRender()"></div>
      <div><label class="f-lbl">Max price &#2547;</label>
        <input id="scr-price" type="number" value="2000" step="10" oninput="scrRender()"></div>
    </div>
  </div>

  <div class="bar">
    <span class="cnt" id="scr-count">Loading the market&hellip;</span>
    <span class="rank">ranked by score</span>
  </div>

  <div class="card" style="overflow:auto;max-height:78vh">
    <div class="thead"><div>Stock</div><div>Score</div><div>LTP</div><div>Sector</div><div style="text-align:center">Signal</div></div>
    <div id="scr-rows"></div>
  </div>

  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script>
const API="https://dsepulse-backend-production.up.railway.app";
const sigBg={"STRONG BUY":"var(--green-bg)","BUY":"#F0FDF4","NEUTRAL":"var(--gold-bg)","SELL":"var(--red-bg)"};
const sigTxt={"STRONG BUY":"var(--green)","BUY":"var(--green)","NEUTRAL":"var(--gold)","SELL":"var(--red)"};
let SCR_DATA=null;

async function load(){
  try{
    const res=await fetch(API+"/api/bd/all");
    const live=await res.json();
    SCR_DATA=Array.isArray(live)?live:[];
  }catch(e){ SCR_DATA=[]; }
  const secs=[...new Set(SCR_DATA.map(r=>r.sector).filter(Boolean))].sort();
  const sel=document.getElementById('scr-sector');
  if(sel) sel.innerHTML='<option value="all">All sectors</option>'+secs.map(s=>'<option>'+s+'</option>').join('');
  if(!SCR_DATA.length){ document.getElementById('scr-count').textContent='Could not load market data right now.'; }
  scrRender();
}

function scrRender(){
  if(!SCR_DATA) return;
  const gv=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const sig=gv('scr-sig')||'all', sec=gv('scr-sector')||'all';
  const ms=Number(gv('scr-score')||0), mp=Number(gv('scr-price')||1e9);
  const so=document.getElementById('scr-score-out'); if(so) so.textContent=ms;
  const rows=SCR_DATA.filter(r=>{
    const s=String(r.signal||'').toUpperCase();
    if(sig==='buy' && s.indexOf('BUY')<0) return false;
    if(sig==='strong' && s!=='STRONG BUY') return false;
    if(sec!=='all' && r.sector!==sec) return false;
    if(Number(r.score||0)<ms) return false;
    if(Number(r.ltp||0)>mp) return false;
    return true;
  }).sort((a,b)=>Number(b.score||0)-Number(a.score||0));
  const cnt=document.getElementById('scr-count');
  if(cnt && SCR_DATA.length) cnt.textContent=rows.length+' of '+SCR_DATA.length+' stocks match';
  const el=document.getElementById('scr-rows'); if(!el) return;
  if(!rows.length){ el.innerHTML='<div style="padding:18px;font-size:13px;color:var(--text3)">No stocks match \u2014 loosen a filter.</div>'; return; }
  el.innerHTML=rows.map((r,i)=>{
    const sc=Number(r.score||0),ltp=Number(r.ltp||0),sg=r.signal||'',sc2=r.sector||'';
    const scC=sc>=70?'var(--green)':sc>=55?'#1A6B3C':sc>=40?'var(--gold)':'var(--red)';
    const last=i===rows.length-1?';border-bottom:none':'';
    return '<div style="display:grid;grid-template-columns:1fr 80px 90px 130px 110px;gap:8px;padding:9px 18px;align-items:center;border-bottom:1px solid var(--border)'+last+'">'
      +'<div><span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">'+r.code+'</span>'+(r.cat?' <span style="font-size:9px;padding:1px 6px;background:var(--cream2);border:1px solid var(--border);border-radius:3px;color:var(--text3)">'+r.cat+'</span>':'')+'</div>'
      +'<div style="text-align:right;font-size:13px;font-weight:800;font-family:var(--mono);color:'+scC+'">'+sc.toFixed(0)+'<span style="font-size:9px;color:var(--text3)">/100</span></div>'
      +'<div style="text-align:right;font-size:12px;font-weight:700;font-family:var(--mono);color:var(--navy)">\u09f3'+ltp.toFixed(2)+'</div>'
      +'<div style="font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+sc2+'</div>'
      +'<div style="text-align:center"><span style="padding:3px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:'+(sigTxt[sg]||'var(--text2)')+';background:'+(sigBg[sg]||'var(--cream2)')+';border:1px solid currentColor;border-radius:4px;opacity:0.85">'+sg+'</span></div>'
      +'</div>';
  }).join('');
}

load();
</script>
</body>
</html>
