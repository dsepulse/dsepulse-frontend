<div style="background:#F4F0E6;border-radius:12px;padding:18px 18px 20px;font-family:Inter,system-ui,sans-serif">
  <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#4A5568;margin-bottom:12px">Sector strength · average signal score</div>
  <div id="heat" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(134px,1fr));gap:10px"></div>
  <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:10px;color:#9AA3B0">
    <span><b style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#1A6B3C;vertical-align:middle;margin-right:5px"></b>Strong 60+</span>
    <span><b style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#B8860B;vertical-align:middle;margin-right:5px"></b>Moderate 45–59</span>
    <span><b style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#1A3260;vertical-align:middle;margin-right:5px"></b>Building 30–44</span>
    <span><b style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#9AA3B0;vertical-align:middle;margin-right:5px"></b>Weak</span>
    <span><b style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#D1C9B8;vertical-align:middle;margin-right:5px"></b>No signal</span>
  </div>
</div>
<script>
(function(){
  var data=[["IT",55,9],["Real Estate",48,6],["Ceramics",37,5],["Telecom",27,3],["Paper",25,4],["Cement",21,5],["Travel",17,3],["Pharma",16,12],["Engineering",13,14],["Textile",11,18],["Other",5,7],["Insurance",5,11],["Fuel & Power",4,6],["NBFI",4,8],["Bank",3,13],["Food",2,5],["Mutual Fund",0,22],["Corporate Bond",0,4],["Tannery",0,3],["Jute",0,3]];
  function tier(v){ if(v>=60)return"#1A6B3C"; if(v>=45)return"#B8860B"; if(v>=30)return"#1A3260"; if(v>0)return"#9AA3B0"; return"#D1C9B8"; }
  document.getElementById("heat").innerHTML=data.map(function(x,i){
    var v=x[1],col=tier(v),w=Math.max(Math.min(v,100),0),numCol=v>0?col:"#9AA3B0";
    return '<div style="background:#fff;border:1px solid #E2DECE;border-radius:10px;padding:13px 14px 12px;display:flex;flex-direction:column;gap:9px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:#4A5568;line-height:1.25">'+x[0]+'</div><div style="font-size:9px;font-family:JetBrains Mono,monospace;color:#9AA3B0;padding-top:1px">#'+(i+1)+'</div></div>'
      +'<div style="font-size:26px;font-weight:800;font-family:JetBrains Mono,monospace;line-height:1;color:'+numCol+'">'+v+'</div>'
      +'<div style="height:5px;border-radius:3px;background:#F4F0E6;overflow:hidden"><i style="display:block;height:100%;border-radius:3px;width:'+w+'%;background:'+col+'"></i></div>'
      +'<div style="font-size:9px;color:#9AA3B0;display:flex;justify-content:space-between"><span>'+x[2]+' stocks</span><span>avg signal</span></div>'
      +'</div>';
  }).join("");
})();
</script>
