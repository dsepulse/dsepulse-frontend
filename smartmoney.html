<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Smart Money &middot; DSE Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF; --cream:#FAF8F3; --cream2:#F4F0E6; --cream3:#EDE8DA;
  --navy:#0D1F3C; --navy2:#1A3260; --gold:#B8860B; --gold2:#D4A017;
  --gold-bg:#FDF8EC; --gold-border:#E8D5A0; --green:#1A6B3C; --green-bg:#EDF7F1;
  --green-bright:#2E8B57; --red:#B91C1C; --red-bg:#FEF2F2;
  --text:#1A1A2E; --text2:#4A5568; --text3:#9AA3B0; --border:#E2DECE; --border2:#D1C9B8;
  --mono:'JetBrains Mono',monospace; --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream2);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 22px}
.hdr-in{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--navy)}
.logo span{color:var(--gold)}
.back{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600}
.back:hover{text-decoration:underline}
.wrap{max-width:980px;margin:0 auto;padding:22px}
.h-title{font-family:var(--serif);font-weight:800;font-size:24px;color:var(--navy);margin-bottom:3px}
.h-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.foot{font-size:11px;color:var(--text3);text-align:center;padding:22px;margin-top:8px}
  #dt-smartmoney .smf-label{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);margin-bottom:10px}
  #dt-smartmoney .smf-head{background:var(--navy);border-radius:10px;padding:13px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  #dt-smartmoney .smf-into-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8fa3c4;margin-bottom:4px}
  #dt-smartmoney .smf-into{font-size:14px;font-weight:700;color:#fff}
  #dt-smartmoney .smf-counts{display:flex;gap:16px;text-align:center}
  #dt-smartmoney .smf-cnum{font-size:18px;font-weight:800}
  #dt-smartmoney .smf-clbl{font-size:9px;color:#8fa3c4;text-transform:uppercase;letter-spacing:.06em}
  #dt-smartmoney .smf-filters{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
  #dt-smartmoney .smf-chip{font-size:11px;padding:5px 11px;border:1px solid var(--border);border-radius:20px;background:var(--white);color:var(--text2);cursor:pointer;-webkit-appearance:none;appearance:none;outline:none}
  #dt-smartmoney .smf-chip:focus{border-color:var(--navy)}
  #dt-smartmoney input.smf-chip{width:130px;cursor:text}
  #dt-smartmoney .smf-secthead{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:3px;margin-top:4px}
  #dt-smartmoney .smf-secdot{width:8px;height:8px;border-radius:50%;display:inline-block}
  #dt-smartmoney .smf-seccap{font-size:11px;color:var(--text3);margin-bottom:9px;font-style:italic}
  #dt-smartmoney .smf-card{border:1px solid var(--border);border-radius:10px;background:var(--white);padding:12px 14px;margin-bottom:7px;cursor:pointer}
  #dt-smartmoney .smf-card:last-of-type{margin-bottom:18px}
  #dt-smartmoney .smf-card:hover{border-color:var(--border2)}
  #dt-smartmoney .smf-ctop{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  #dt-smartmoney .smf-code{font-family:var(--mono);font-weight:800;font-size:15px;color:var(--navy)}
  #dt-smartmoney .smf-sec{font-size:11px;color:var(--text3);flex:1}
  #dt-smartmoney .smf-spk{width:78px;height:26px;display:flex;align-items:center;justify-content:flex-end}
  #dt-smartmoney .smf-badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:5px;color:#fff;white-space:nowrap}
  #dt-smartmoney .smf-metrics{display:flex;gap:14px;font-size:11px;color:var(--text2);margin-bottom:9px;flex-wrap:wrap;align-items:center}
  #dt-smartmoney .smf-metrics b{color:var(--navy)}
  #dt-smartmoney .smf-eng{margin-left:auto;background:var(--cream2);color:var(--text2);font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}
  #dt-smartmoney .smf-eng.on{background:#eaf1fb;color:#1d4ed8}
  #dt-smartmoney .smf-foot{display:flex;gap:0;border-top:1px solid var(--cream2);padding-top:9px}
  #dt-smartmoney .smf-fc{flex:1}
  #dt-smartmoney .smf-fl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
  #dt-smartmoney .smf-fv{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--navy)}
  #dt-smartmoney .smf-fv.g{color:var(--green)} #dt-smartmoney .smf-fv.r{color:var(--red)}
  #dt-smartmoney .smf-legend{display:flex;gap:18px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:12px;flex-wrap:wrap}
  #dt-smartmoney .smf-legend .ld{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
  #dt-smartmoney .smf-empty{padding:34px;text-align:center;color:var(--text3);font-size:12px;background:var(--white);border:1px solid var(--border);border-radius:10px}
  #dt-smartmoney .smf-reload{padding:5px 11px;border:1px solid var(--border);border-radius:20px;background:var(--white);color:var(--text3);font-size:11px;cursor:pointer}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><span>&#9670;</span> DSE Pulse</div>
  <a class="back" href="https://dsepulse.com">&larr; Back to app</a>
</div></div>

<div class="wrap">
  <div class="h-title">Smart Money</div>
  <div class="h-sub">Where the blocks and volume are flowing &mdash; Breakout, Coiled, Inflow, Distribution</div>
  <div id="dt-smartmoney"></div>
  <div class="foot">Informational only &middot; not investment advice &middot; DSE Pulse</div>
</div>

<script src="/engine.js"></script>
<script>
(function(){
  const API="https://dsepulse-backend-production.up.railway.app";
  const STD=['overview','picks','wma','tech','combined','bd','sectors','analyse','holdings'];
  let loaded=false, ROWS=[], ITEMS=[], _fb=false, _enriched=false, NEWMETA='';

  async function fj(p){ try{const r=await fetch(API+p);if(!r.ok)return null;return await r.json();}catch(e){return null;} }
  const num=v=>{ if(v==null)return null; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n)?null:n; };
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const msFor=c=>(window.__ms&&window.__ms.for)?window.__ms.for(c):null;
  const val=id=>{const e=document.getElementById(id);return e?e.value:"";};

  const ST={
    breakout:    {label:"Breakout",     dot:"#1A6B3C", num:"#5fd08a", cap:"Enter on the breakout candle \u2014 smart money already in."},
    coiled:      {label:"Coiled",       dot:"#B8860B", num:"#e8b84b", cap:"Heavy buying while price stays flat \u2014 a spring being wound."},
    inflow:      {label:"Inflow",       dot:"#1D4ED8", num:"#6ea8f0", cap:"Accumulation building \u2014 add to watchlist, not yet a buy."},
    distribution:{label:"Distribution", dot:"#B91C1C", num:"#e57373", cap:"Blocks sold into the move \u2014 smart money stepping out."}
  };
  const ORDER=["breakout","coiled","inflow","distribution"];

  function classify(r,s){
    const read=String(r.read||"").toLowerCase();
    const dir =String(r.direction||"").toLowerCase();
    const blk =String(r.block_dir||"").toUpperCase();
    const vol =num(r.vol_ratio)||0;
    const pct =num(r.pct);
    const rsi =(s&&s.rsi!=null)?s.rsi:null;
    const up=pct!=null&&pct>0, flat=pct!=null&&Math.abs(pct)<=1.5, ob=rsi!=null&&rsi>=75;
    const bearish=dir==="bearish"||/distribution|insider sell/.test(read)||blk==="SELL";
    const accum=/accumulation|insider buy/.test(read);
    const bull=accum||dir==="bullish"||/bullish/.test(read);
    const stealth=/stealth/.test(read);
    if(bearish) return "distribution";
    if(up&&!ob&&(blk==="BUY"||accum||vol>=2.0)) return "breakout";
    if(stealth||(bull&&flat)) return "coiled";
    if(bull||up) return "inflow";
    if(/frenzy|retail/.test(read)) return "distribution";
    return "inflow";
  }

  function blockChip(bd){ bd=String(bd||"").toUpperCase();
    if(bd==="BUY") return '<span style="color:var(--green);font-weight:700">\u25B2 block BUY</span>';
    if(bd==="SELL")return '<span style="color:var(--red);font-weight:700">\u25BC block SELL</span>';
    return '<span style="color:var(--text3)">\u25CF block \u2014</span>'; }

  function spark(prices,color){
    if(!prices||prices.length<2)return "";
    const w=78,h=26,n=prices.length,mn=Math.min.apply(null,prices),mx=Math.max.apply(null,prices),rg=(mx-mn)||1;
    const pts=prices.map((p,i)=>((i/(n-1))*w).toFixed(0)+","+(h-2-((p-mn)/rg)*(h-4)).toFixed(0)).join(" ");
    return '<svg width="78" height="26" viewBox="0 0 78 26"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.6"/></svg>';
  }

  function panelHTML(){
    return '<div class="smf-label">Smart Money \u00b7 Flow Signals</div>'+
      '<div id="smf-head"></div>'+
      '<div class="smf-filters">'+
        '<select id="sm-fsector" class="smf-chip"></select>'+
        '<select id="sm-fstatus" class="smf-chip">'+
          '<option value="">Any status</option>'+ORDER.map(k=>'<option value="'+k+'">'+ST[k].label+'</option>').join('')+'</select>'+
        '<select id="sm-fsort" class="smf-chip">'+
          '<option value="strength">Sort: strength</option>'+
          '<option value="conv">Sort: conviction</option>'+
          '<option value="pct">Sort: % change</option></select>'+
        '<input id="sm-fsearch" class="smf-chip" placeholder="\uD83D\uDD0D search code">'+
        '<button id="sm-reload" class="smf-reload">Reload</button>'+
      '</div>'+
      '<div id="smf-body"></div>'+
      '<div id="smf-legend"></div>';
  }

  function counts(list){ const c={breakout:0,coiled:0,inflow:0,distribution:0}; list.forEach(x=>c[x.status]++); return c; }

  function renderHead(){
    const head=document.getElementById('smf-head'); if(!head)return;
    if(!ITEMS.length){ head.innerHTML=''; return; }
    const c=counts(ITEMS);
    const flow={}; ITEMS.forEach(x=>{ if(x.status!=='distribution'&&x.sector){ flow[x.sector]=(flow[x.sector]||0)+(x.score||1); } });
    const into=Object.keys(flow).sort((a,b)=>flow[b]-flow[a]).slice(0,3).join(' \u00b7 ')||'\u2014';
    head.innerHTML='<div class="smf-head"><div>'+
        '<div class="smf-into-lbl">Smart money flowing into</div>'+
        '<div class="smf-into">'+esc(into)+'</div></div>'+
      '<div class="smf-counts">'+ORDER.map(k=>
        '<div><div class="smf-cnum" style="color:'+ST[k].num+'">'+c[k]+'</div><div class="smf-clbl">'+ST[k].label+'</div></div>'
      ).join('')+'</div></div>'+
      (NEWMETA?'<div style="font-size:11px;color:var(--text3);margin:8px 0 0 2px">'+NEWMETA+'</div>':'');
  }

  function cardHTML(x){
    const r=x.r, s=x.s, st=ST[x.status];
    const sec=x.sector||'\u2014';
    const price=num(r.ltp)!=null?'\u09F3'+num(r.ltp).toFixed(2):'';
    const metrics=[];
    if(s&&s.rsi!=null) metrics.push('<span>RSI <b>'+Math.round(s.rsi)+'</b></span>');
    const circ=(s&&s.tech&&s.tech.ctx&&s.tech.ctx.circuit&&s.tech.ctx.circuit!=='\u2014')?s.tech.ctx.circuit:null;
    if(circ) metrics.push('<span><b>'+esc(circ)+'</b> to circuit</span>');
    metrics.push('<span>'+blockChip(r.block_dir)+'</span>');
    if(num(r.vol_ratio)) metrics.push('<span>vol <b>\u00d7'+num(r.vol_ratio).toFixed(1)+'</b></span>');
    const eng = s ? '<span class="smf-eng '+(s.conv>=65?'on':'')+'">'+s.agreeN+'/6 engines \u00b7 conv '+s.conv+'</span>'
                  : '<span class="smf-eng">not scored yet</span>';
    metrics.push(eng);
    const p=s&&s.plan;
    const entry=p?p.entry:num(r.ltp), target=p?p.target:null, stop=p?p.stop:null, rr=p?p.rr:null;
    const fv=(v,cls)=>'<div class="smf-fv'+(cls?' '+cls:'')+'">'+(v!=null?'\u09F3'+(+v).toFixed(1):'\u2014')+'</div>';
    const spk=x.prices&&x.prices.length>1?spark(x.prices.slice(-14),st.dot):'';
    return '<div class="smf-card" data-code="'+esc(x.code)+'">'+
      '<div class="smf-ctop">'+
        '<span class="smf-code">'+esc(x.code)+'</span>'+
        '<span class="smf-sec">'+esc(sec)+(price?' \u00b7 '+price:'')+'</span>'+
        '<span class="smf-spk" id="spk-'+esc(x.code)+'">'+spk+'</span>'+
        (x.isNew?'<span style="font-size:9px;font-weight:800;letter-spacing:.04em;padding:3px 6px;border-radius:4px;background:#FDE68A;color:#92400E">NEW</span>':'')+
        '<span class="smf-badge" style="background:'+st.dot+'">'+st.label+'</span>'+
      '</div>'+
      '<div class="smf-metrics">'+metrics.join('')+'</div>'+
      '<div class="smf-foot">'+
        '<div class="smf-fc"><div class="smf-fl">Entry</div>'+fv(entry)+'</div>'+
        '<div class="smf-fc"><div class="smf-fl">Target</div>'+fv(target,'g')+'</div>'+
        '<div class="smf-fc"><div class="smf-fl">Stop</div>'+fv(stop,'r')+'</div>'+
        '<div class="smf-fc"><div class="smf-fl">R:R</div><div class="smf-fv">'+(rr!=null&&isFinite(rr)?(+rr).toFixed(1)+'\u00d7':'\u2014')+'</div></div>'+
      '</div></div>';
  }

  function renderBody(){
    const body=document.getElementById('smf-body'), legend=document.getElementById('smf-legend');
    if(!body)return;
    if(!ITEMS.length){
      body.innerHTML='<div class="smf-empty">No smart-money activity in the latest session. If your Activity Detector tool hasn\u2019t uploaded for the latest trading day, this stays blank until it does.</div>';
      if(legend)legend.innerHTML=''; return;
    }
    const fs=val('sm-fsector'), fst=val('sm-fstatus'), q=(val('sm-fsearch')||'').toUpperCase().trim(), by=val('sm-fsort')||'strength';
    let list=ITEMS.filter(x=>(!fs||x.sector===fs)&&(!fst||x.status===fst)&&(!q||x.code.indexOf(q)>=0));
    list.sort((a,b)=> by==='conv'?(b.conv-a.conv): by==='pct'?((b.pct==null?-999:b.pct)-(a.pct==null?-999:a.pct)) : (b.score-a.score));
    if(!list.length){ body.innerHTML='<div class="smf-empty">No names match these filters.</div>'; if(legend)legend.innerHTML=''; return; }
    const groups={breakout:[],coiled:[],inflow:[],distribution:[]};
    list.forEach(x=>groups[x.status].push(x));
    let html='';
    ORDER.forEach(k=>{ const g=groups[k]; if(!g.length)return;
      html+='<div class="smf-secthead"><span class="smf-secdot" style="background:'+ST[k].dot+'"></span>'+ST[k].label+' \u00b7 '+g.length+'</div>'+
            '<div class="smf-seccap">'+ST[k].cap+'</div>'+ g.map(cardHTML).join('');
    });
    body.innerHTML=html;
    body.querySelectorAll('.smf-card').forEach(el=>{ el.onclick=function(){ const c=el.getAttribute('data-code'); const s=msFor(c); if(window.__openBDCard) window.__openBDCard(c, s&&s.mem?s.mem:[]); }; });
    if(legend){
      const zero=ORDER.filter(k=>groups[k].length===0).map(k=>'<span><span class="ld" style="background:'+ST[k].dot+'"></span>'+ST[k].label+' \u00b7 0 today</span>').join('');
      legend.innerHTML='<div class="smf-legend">'+zero+'<span style="margin-left:auto">Tap any row \u2192 full Master Signal card</span></div>';
    }
  }

  function populateFilters(){
    const sel=document.getElementById('sm-fsector'); if(sel){
      const secs=Array.from(new Set(ITEMS.map(x=>x.sector).filter(Boolean))).sort();
      sel.innerHTML='<option value="">All sectors</option>'+secs.map(s=>'<option value="'+esc(s)+'">'+esc(s)+'</option>').join('');
    }
    if(!_fb){ _fb=true;
      ['sm-fsector','sm-fstatus','sm-fsort'].forEach(id=>{const e=document.getElementById(id);if(e)e.onchange=renderBody;});
      const q=document.getElementById('sm-fsearch'); if(q)q.oninput=renderBody;
      const rb=document.getElementById('sm-reload'); if(rb)rb.onclick=function(){ loaded=false;_enriched=false; buildSM(); };
    }
  }

  async function enrichSparklines(){
    if(_enriched)return; _enriched=true;
    const list=ITEMS.slice(0,40);
    await Promise.all(list.map(async x=>{
      try{ const d=await fj('/api/bd/eval/'+encodeURIComponent(x.code));
        const pr=(d&&Array.isArray(d.prices))?d.prices:[];
        if(pr.length>1){ x.prices=pr; const slot=document.getElementById('spk-'+x.code); if(slot) slot.innerHTML=spark(pr.slice(-14), ST[x.status].dot); }
      }catch(e){}
    }));
  }

  function markNew(){
    try{
      let scanDate=''; for(const r of ROWS){ if(r&&r.trade_date){ scanDate=r.trade_date; break; } }
      if(!scanDate) scanDate=new Date().toISOString().slice(0,10);
      const cur=ITEMS.map(x=>x.code);
      let store={}; try{ store=JSON.parse(localStorage.getItem('sm_newtoday')||'{}'); }catch(e){}
      let baseline=[];
      if(store.curDate && store.curDate!==scanDate){ baseline=store.curCodes||[]; store={prevDate:store.curDate,prevCodes:store.curCodes||[],curDate:scanDate,curCodes:cur}; }
      else if(store.curDate===scanDate){ baseline=store.prevCodes||[]; store.curCodes=cur; }
      else { store={prevDate:'',prevCodes:[],curDate:scanDate,curCodes:cur}; }
      const bset={}; baseline.forEach(c=>{bset[c]=1;});
      let n=0; ITEMS.forEach(x=>{ x.isNew = baseline.length>0 && !bset[x.code]; if(x.isNew)n++; });
      try{ localStorage.setItem('sm_newtoday',JSON.stringify(store)); }catch(e){}
      NEWMETA='As of '+scanDate+(n?(' \u00b7 '+n+' new today'):'');
    }catch(e){ NEWMETA=''; }
  }

  async function buildSM(){
    if(!loaded){
      const head=document.getElementById('smf-head'); if(head)head.innerHTML='<div class="smf-empty" style="background:transparent;border:0;padding:10px">Loading flow signals\u2026</div>';
      const d=await fj('/api/activity/today');
      ROWS=Array.isArray(d)?d:((d&&d.data)||[]);
      try{ if(window.__ms&&window.__ms.ready) await window.__ms.ready(); }catch(e){}
      ITEMS=ROWS.map(r=>{ const code=String(r.code||'').toUpperCase(); if(!code)return null; const s=msFor(code);
        return {code,r,s,status:classify(r,s),score:num(r.activity_score)||0,conv:s?s.conv:0,pct:num(r.pct),
                sector:(s&&s.sector)||r.sector||r.cat||'',prices:null}; }).filter(Boolean);
      markNew();
      loaded=true; populateFilters();
    }
    renderHead(); renderBody(); enrichSparklines();
  }

  function boot(){
    const host=document.getElementById('dt-smartmoney');
    if(host){ host.innerHTML=panelHTML(); buildSM(); }
  }
  if(document.readyState!=='loading') boot(); else document.addEventListener('DOMContentLoaded',boot);
})();
</script>
</body>
</html>
