name: Daily Trial Win-back Emails

# Runs once a day. Win-back logic is date-based (Day 0/2/5 after a trial
# expires), so the exact time doesn't matter — it just needs to run daily.
on:
  schedule:
    - cron: "0 5 * * *"      # 05:00 UTC daily = 11:00 AM Dhaka time
  workflow_dispatch: {}        # also lets you run it manually from the Actions tab

jobs:
  winback:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger win-back endpoint
        run: |
          curl -sS -X POST \
            "https://dsepulse-backend-production.up.railway.app/api/cron/winback" \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
